apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: students
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: jerry890926/k8s-images:lab-project
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              sed -i \
                -e 's|config\.APP_DB_HOST = "localhost"|// &|' \
                -e 's|config\.APP_DB_NAME = "STUDENTS"|// &|' \
                -e 's|config\.APP_DB_PASSWORD = "student12"|// &|' \
                -e 's|config\.APP_DB_USER = "nodeapp"|// &|' \
                /home/ubuntu/resources/codebase_partner/app/config/config.js
              cd /home/ubuntu/resources/codebase_partner && exec npm start
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: APP_PORT
              value: "3000"
          envFrom:
            - secretRef:
                name: db-credentials
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }

